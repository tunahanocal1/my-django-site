<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>
    <style>
        /* Dark Theme + Minimal Tasarım */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #333;
            background-color: #1c1c1c;
        }

        .site-title {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
        }

        nav a {
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            background-color: #1f2937;
            color: #fff;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        nav a:hover {
            background-color: #374151;
        }

        main {
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }

        h1, h2 {
            color: #ffffff;
        }

        /* Minimal Form */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: #1c1c1c;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input[type="text"], input[type="password"], input[type="email"] {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: #2a2a2a;
            color: #fff;
        }

        input[type="submit"] {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: #3b82f6;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        input[type="submit"]:hover {
            background-color: #2563eb;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="site-title">NetBox</h1>
        <nav>
            <a href="{% url 'login' %}">Giriş Yap</a>
            <a href="{% url 'register' %}">Kayıt Ol</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        &copy; 2026 NetBox. Tüm hakları saklıdır.
    </footer>
</body>
</html>
