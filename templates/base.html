<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox | Kitap Dünyan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #3b82f6;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        a { text-decoration: none; transition: 0.3s; }

        /* HEADER & NAV */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 10%;
            background-color: rgba(13, 17, 23, 0.95);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #010409;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 5px 15px;
            width: 100%;
            max-width: 450px;
        }

        .search-input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            width: 100%;
            outline: none;
        }

        .nav-links a {
            margin-left: 20px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-links a:hover { color: var(--accent-color); }

        .profile-btn {
            background: var(--accent-color);
            color: white !important;
            padding: 8px 16px;
            border-radius: 6px;
        }

        /* MAIN */
        main {
            padding: 2rem 10%;
            min-height: 80vh;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <a href="{% url 'home' %}" class="logo"><i class="fas fa-box-open"></i> NetBox</a>

    {% if user.is_authenticated %}
    <form action="{% url 'search' %}" method="GET" class="search-box">
        <i class="fas fa-search" style="color: var(--text-muted);"></i>
        <input type="text" name="q" placeholder="Kitap veya yazar ara..." class="search-input">
    </form>
    {% endif %}

    <nav class="nav-links">
        {% if user.is_authenticated %}
            <a href="{% url 'home' %}">Keşfet</a>
            <a href="{% url 'profile' %}" class="profile-btn"><i class="fas fa-user-circle"></i> {{ user.username }}</a>
            <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i></a>
        {% else %}
            <a href="{% url 'login' %}">Giriş Yap</a>
            <a href="{% url 'register' %}" class="profile-btn">Kayıt Ol</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>&copy; 2026 NetBox. Okuma serüvenine eşlik eder.</p>
</footer>

</body>
</html>
