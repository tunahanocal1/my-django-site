<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* NAVBAR */
        header {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #333;
            background-color: #1c1c1c;
        }

        /* Logo */
        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
            margin-right: 20px;
        }

        .logo:hover {
            color: #fff;
        }

        /* SEARCH ORTA */
        .search-form {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .search-input {
            width: 60%;
            max-width: 500px;
            padding: 14px 20px;
            border-radius: 999px;
            border: none;
            background: #1f1f1f;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-input::placeholder {
            color: #aaa;
        }

        .search-input:focus {
            background: #2a2a2a;
        }

        /* Search icon */
        .search-btn {
            margin-left: -45px;
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .search-btn:hover {
            color: #fff;
        }

        /* NAV RIGHT */
        nav {
            margin-left: 20px;
        }

        nav a {
            padding: 0.5rem 1rem;
            background-color: #1f2937;
            color: #fff;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        nav a:hover {
            background-color: #374151;
        }

        /* CONTENT */
        main {
            padding: 2rem;
            max-width: 1000px;
            margin: auto;
        }

        h1, h2 {
            color: #ffffff;
        }

        /* FORM */
        form:not(.search-form) {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background-color: #1c1c1c;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: #2a2a2a;
            color: #fff;
        }

        input[type="submit"] {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: none;
            background-color: #3b82f6;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #2563eb;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    <a href="{% url 'home' %}" class="logo">NetBox</a>

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    &copy; 2026 NetBox. All rights reserved.
</footer>

</body>
</html>
