<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Django Site</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">MySite</a>

        <div>
            {% if user.is_authenticated %}
                <span class="text-white me-3">👤 {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-danger">Çıkış</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-success me-2">Giriş</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Kayıt</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
