<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at top, #1a1a2e, #0f0f0f);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            backdrop-filter: blur(10px);
            background: rgba(20, 20, 20, 0.6);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* LOGO */
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 600;
            color: #3b82f6;
            text-decoration: none;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .navbar-brand:hover {
            color: #60a5fa;
        }

        /* NAV */
        nav {
            display: flex;
            gap: 10px;
        }

        nav a {
            padding: 8px 14px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            color: #ddd;
            background: rgba(255,255,255,0.05);
            transition: 0.25s;
        }

        nav a:hover {
            background: rgba(59,130,246,0.2);
            color: #fff;
        }

        /* USER BADGE */
        .user-badge {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            color: white;
        }

        /* MAIN */
        main {
            padding: 2rem;
            max-width: 1100px;
            margin: auto;
        }

        /* CARD STYLE */
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* BUTTON */
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>

<body>

<header>
    <a href="{% url 'home' %}" class="navbar-brand">NetBox</a>

    <nav>
        {% if user.is_authenticated %}
            <span class="user-badge">
                {{ user.username }}
            </span>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    © 2026 NetBox
</footer>

</body>
</html>
