<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetBox</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0f1114; /* Koyu arka plan */
            color: #e1e4e8;
            /* Hafif bir derinlik katmak için degrade */
            background: radial-gradient(circle at top, #1a1d23 0%, #0f1114 100%);
            min-height: 100vh;
        }

        /* HEADER - Sabitlendi ve şeffaflaştırıldı */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background-color: rgba(10, 11, 13, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #21262d;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #3b82f6, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }

        /* SEARCH BOX - Daha modern */
        .search-box {
            display: flex;
            align-items: center;
            background: #0a0b0d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 0.2rem 0.8rem;
            width: 100%;
            max-width: 400px;
            transition: 0.3s;
        }
        .search-box:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

        .search-input {
            flex: 1; border: none; background: transparent; color: #fff; padding: 0.6rem; outline: none;
        }

        /* NAV */
        nav a {
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            color: #8b949e;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover { background-color: #21262d; color: #fff; }

        main { padding: 2rem; max-width: 1100px; margin: auto; }
        
        footer { text-align: center; padding: 2rem; color: #484f58; border-top: 1px solid #21262d; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <a href="{% url 'home' %}" class="logo">NetBox</a>

    {% if user.is_authenticated %}
    <form action="{% url 'search' %}" method="GET" class="search-form">
        <div class="search-box">
            <input type="text" name="q" placeholder="Search books..." class="search-input">
            <button type="submit" class="search-btn" style="background:none; border:none; color:#8b949e; cursor:pointer;">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </form>
    {% endif %}

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}"><i class="fas fa-user-circle"></i> {{ user.username }}</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" style="background:#3b82f6; color:#fff;">Join Now</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 NetBox. Track your reading journey.
</footer>

</body>
</html>
