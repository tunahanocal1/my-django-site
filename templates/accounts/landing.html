{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>NetBox</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
        }

        .hero {
            height: 100vh;
            background: url("{% static 'images/hero.jpg' %}") no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            z-index: 10;
        }

        .navbar-brand {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
        }

        .content {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            background: #00c030;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            right: 40px;
            z-index: 3;
        }

        .top-bar a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">NetBox</a>
    </header>
    <div class="hero">
        <div class="overlay"></div>

        <div class="content">
            <h1>Track books you’ve read</h1>
            <p>Save what you want to read. Share with friends.</p>
            <a href="{% url 'register' %}" class="btn">Get started — it’s free!</a>
        </div>
    </div>
</body>
</html>
