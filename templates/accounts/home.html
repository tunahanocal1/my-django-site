{% extends 'base.html' %}

{% block content %}

<div class="text-center">
    <h1 class="mb-4">🚀 Django Siteme Hoşgeldin</h1>

    {% if user.is_authenticated %}
        <div class="alert alert-success">
            Giriş yaptın: <strong>{{ user.username }}</strong>
        </div>
    {% else %}
        <p class="lead">Devam etmek için giriş yap veya kayıt ol</p>
    {% endif %}
</div>

{% endblock %}
