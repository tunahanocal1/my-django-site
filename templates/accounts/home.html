{% extends 'base.html' %}

{% block content %}

<div class="text-center">
    <a href="{% url 'home' %}" class="navbar-brand">NetBox</a>

    {% if user.is_authenticated %}
        <div class="alert alert-success">
            Giriş yaptın: <strong>{{ user.username }}</strong>
        </div>
    {% else %}
        <p class="lead">Devam etmek için giriş yap veya kayıt ol</p>
    {% endif %}
</div>

{% endblock %}
