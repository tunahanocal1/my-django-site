{% extends "base.html" %}

{% block content %}
<div style="max-width: 1000px; margin: 40px auto; padding: 0 20px;">
    <h1 style="color: #fff; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 30px;">
        {{ title }} 
        <span style="font-size: 1rem; color: #9ab;">({{ books.count }})</span>
    </h1>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px;">
        {% for book in books %}
            <div class="book-item" style="text-align: center;">
                <a href="{% url 'book_detail' book.olid %}">
                    <img src="{{ book.thumbnail }}" alt="{{ book.title }}" 
                         style="width: 100%; height: 220px; object-fit: cover; border-radius: 8px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                    <p style="color: #fff; margin-top: 10px; font-size: 0.9rem; font-weight: bold;">{{ book.title }}</p>
                </a>
            </div>
        {% empty %}
            <p style="color: #9ab; grid-column: 1/-1;">This list is currently empty.</p>
        {% endfor %}
    </div>
    
    <div style="margin-top: 40px;">
        <a href="{% url 'profile' %}" style="color: #00c030; text-decoration: none;">← Back to Profile</a>
    </div>
</div>
{% endblock %}
